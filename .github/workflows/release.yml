name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Portable Windows release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH (for example, v1.2.3)"
          }
          $version = $Matches.version
          $cargoManifest = Get-Content -Raw Cargo.toml
          $cargoVersion = [regex]::Match(
            $cargoManifest,
            '(?ms)^\[workspace\.package\]\s*.*?^version\s*=\s*"(?<version>\d+\.\d+\.\d+)"'
          ).Groups['version'].Value
          if ($version -ne $cargoVersion) {
            throw "Tag version $version does not match Cargo.toml version $cargoVersion"
          }
          "TERMY_VERSION=$version" >> $env:GITHUB_ENV

      - name: Run release checks
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked

      - name: Build portable Windows archive
        shell: pwsh
        run: ./packaging/build-portable.ps1 -Version $env:TERMY_VERSION

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/termy-windows-x64.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: termy-${{ env.TERMY_VERSION }}-windows-x64
          path: |
            dist/termy-windows-x64.zip
            dist/termy-windows-x64.zip.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${{ github.ref_name }}" `
              dist/termy-windows-x64.zip `
              dist/termy-windows-x64.zip.sha256 `
              --clobber
          } else {
            gh release create "${{ github.ref_name }}" `
              dist/termy-windows-x64.zip `
              dist/termy-windows-x64.zip.sha256 `
              --verify-tag `
              --generate-notes `
              --title "Termy $env:TERMY_VERSION"
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed"
          }
