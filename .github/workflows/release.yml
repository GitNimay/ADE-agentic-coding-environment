name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Standalone Windows executable
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out verified main commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Derive automatic release version
        shell: pwsh
        run: |
          $cargoManifest = Get-Content -Raw Cargo.toml
          $baseVersion = [regex]::Match(
            $cargoManifest,
            '(?ms)^\[workspace\.package\]\s*.*?^version\s*=\s*"(?<version>\d+\.\d+\.\d+)"'
          ).Groups['version'].Value
          if (-not $baseVersion) {
            throw "Could not read workspace.package.version from Cargo.toml"
          }
          $parts = $baseVersion.Split('.')
          $patch = ([int]$parts[2] * 100000) + [int]"${{ github.event.workflow_run.run_number }}"
          $version = "$($parts[0]).$($parts[1]).$patch"
          "TERMY_BUILD_VERSION=$version" >> $env:GITHUB_ENV
          "TERMY_RELEASE_TAG=v$version" >> $env:GITHUB_ENV

      - name: Download verified CI executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: termy-ci-${{ github.event.workflow_run.run_number }}-windows-x64
          path: dist
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate Windows executable
        shell: pwsh
        run: |
          $path = Resolve-Path dist/windows-x64-termy.exe
          $bytes = [System.IO.File]::ReadAllBytes($path)
          if ($bytes.Length -lt 1024 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "Release artifact is not a valid PE executable"
          }
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          if (
            $peOffset -lt 0 -or
            $peOffset + 6 -gt $bytes.Length -or
            $bytes[$peOffset] -ne 0x50 -or
            $bytes[$peOffset + 1] -ne 0x45 -or
            $bytes[$peOffset + 2] -ne 0 -or
            $bytes[$peOffset + 3] -ne 0
          ) {
            throw "Release artifact has an invalid PE header"
          }
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          if ($machine -ne 0x8664) {
            throw ("Release artifact is not x64 (machine 0x{0:X4})" -f $machine)
          }

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/windows-x64-termy.exe

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:TERMY_RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TERMY_RELEASE_TAG dist/windows-x64-termy.exe --clobber
          } else {
            gh release create $env:TERMY_RELEASE_TAG dist/windows-x64-termy.exe `
              --target "${{ github.event.workflow_run.head_sha }}" `
              --generate-notes `
              --latest `
              --title "Termy $env:TERMY_BUILD_VERSION"
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed"
          }
